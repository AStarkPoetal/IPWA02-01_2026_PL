<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">

<h:head>
    <title>Dashboard</title>
</h:head>

<h:head>
    <title>Dashboard</title>
</h:head>

<h:body>

    <h:form>
        <h2>Require4Testing Dashboard</h2>

        <h:commandButton value="Requirement anlegen"
                         action="#{dashboardBean.showPanel('requirement')}" />

        <h:commandButton value="TestCase anlegen"
                         action="#{dashboardBean.showPanel('testcase')}" />

        <h:commandButton value="Test erstellen"
                         action="#{dashboardBean.showPanel('test')}" />

        <h:commandButton value="TestReport erfassen"
                         action="#{dashboardBean.showPanel('report')}" />

        <h:commandButton value="Task"
                         action="#{dashboardBean.showPanel('task')}" />

        <br/><br/>

        <h:panelGroup rendered="#{dashboardBean.activePanel == 'home'}">
            <h:outputText value="Willkommen im Dashboard." />
        </h:panelGroup>

        <h:panelGroup rendered="#{dashboardBean.activePanel == 'requirement'}">
            <h:outputText value="Requirement-Panel aktiv." />
        </h:panelGroup>

        <h:panelGroup rendered="#{dashboardBean.activePanel == 'testcase'}">
            <h:outputText value="TestCase-Panel aktiv." />
        </h:panelGroup>

        <h:panelGroup rendered="#{dashboardBean.activePanel == 'test'}">
            <h:outputText value="Test-Panel aktiv." />
        </h:panelGroup>

        <h:panelGroup rendered="#{dashboardBean.activePanel == 'report'}">
            <h:outputText value="TestReport-Panel aktiv." />
        </h:panelGroup>

        <h:panelGroup rendered="#{dashboardBean.activePanel == 'task'}">
            <h:outputText value="Task-Panel aktiv." />
        </h:panelGroup>

    </h:form>

</h:body>
</html>
